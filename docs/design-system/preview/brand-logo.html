<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Logos" subtitle="AZZAS 2154 wordmark + 2154 monogram + AZZAS-only" viewport="700x200" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Brand wordmark</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame { width:700px; height:200px; background:var(--surface); display:flex; align-items:center; gap:28px; padding:24px 32px; }
  .mark { display:flex; flex-direction:column; align-items:flex-start; }
  .mark img { height:42px; display:block; }
  .meta { display:flex; flex-direction:column; gap:6px; min-width:0; }
  .meta .h { font-family:var(--font); font-size:13px; font-weight:600; color:var(--text-primary); }
  .meta .p { font-size:12px; color:var(--text-secondary); line-height:1.5; max-width:380px; }
  .rule { width:1px; align-self:stretch; background:var(--border); }
  .vmark { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .vmark img { height:64px; }
  .vmark .lbl { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
</style></head>
<body>
<div class="frame">
  <div class="mark">
    <img src="../assets/logos/azzas-2154-mark-black.png" alt="AZZAS 2154">
    <div style="height:14px"></div>
    <div class="meta">
      <div class="h">Logo institucional · AZZAS 2154</div>
      <div class="p">Wordmark oficial. Use sempre em preto sobre fundos claros. Espaço de proteção mínimo = altura do "A".</div>
    </div>
  </div>
  <div class="rule"></div>
  <div class="vmark"><img src="../assets/logos/2154-stacked-black.png"><div class="lbl">2154 stacked</div></div>
  <div class="vmark"><img src="../assets/logos/azzas-wordmark-black.png"><div class="lbl">AZZAS</div></div>
</div>
</body></html>
