<!doctype html>
<!-- @dsCard group="Brand" name="Colors · Brand apoio" subtitle="Azuis, teal, sand, iris — paleta institucional" viewport="700x180" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Brand colors — apoio</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame { width:700px; padding:22px 28px; background:var(--surface); }
  .head { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin-bottom:12px; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:10px; }
  .tile { display:flex; flex-direction:column; gap:4px; }
  .chip { height:54px; border-radius:var(--radius-sm); border:1px solid var(--border); }
  .name { font-size:10px; font-weight:500; color:var(--text-primary); line-height:1.1; }
  .hex { font-family:var(--mono); font-size:9px; color:var(--text-muted); }
</style></head>
<body>
<div class="frame">
  <div class="head">Cores de apoio · paleta institucional</div>
  <div class="grid">
    <div class="tile"><div class="chip" style="background:#E8E8E8"></div><div class="name">Mist</div><div class="hex">#E8E8E8</div></div>
    <div class="tile"><div class="chip" style="background:#6EB6E4"></div><div class="name">Sky</div><div class="hex">#6EB6E4</div></div>
    <div class="tile"><div class="chip" style="background:#A0C6ED"></div><div class="name">Sky soft</div><div class="hex">#A0C6ED</div></div>
    <div class="tile"><div class="chip" style="background:#3B80D9"></div><div class="name">Blue</div><div class="hex">#3B80D9</div></div>
    <div class="tile"><div class="chip" style="background:#274566"></div><div class="name">Deep</div><div class="hex">#274566</div></div>
    <div class="tile"><div class="chip" style="background:#539193"></div><div class="name">Teal</div><div class="hex">#539193</div></div>
    <div class="tile"><div class="chip" style="background:#B7A696"></div><div class="name">Sand</div><div class="hex">#B7A696</div></div>
    <div class="tile"><div class="chip" style="background:#7A8FE4"></div><div class="name">Iris</div><div class="hex">#7A8FE4</div></div>
  </div>
</div>
</body></html>
