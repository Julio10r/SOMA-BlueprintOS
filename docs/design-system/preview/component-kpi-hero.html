<!doctype html>
<!-- @dsCard group="Brand" name="Components · KPI hero + cards" subtitle="Hero card com composição (FTE + ganhos) + row de 3 kpis coloridos" viewport="700x360" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>KPI hero card</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background:var(--bg); }
  .frame { width:700px; padding:22px 28px; background:var(--bg); display:flex; flex-direction:column; gap:14px; }
  .head { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }

  /* Hero card */
  .hero {
    background:#fff; border:1px solid var(--border);
    border-radius:12px; padding:22px 26px;
    border-left:4px solid var(--concluida);
    box-shadow:0 2px 12px rgba(26,25,22,0.06);
  }
  .hero .top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
  .hero .lbl { font-family:var(--font); font-size:12px; color:var(--text-muted); line-height:1.4; }
  .hero .icon {
    width:32px; height:32px; border-radius:8px;
    background:var(--concluida-bg); color:var(--concluida);
    display:grid; place-items:center;
  }
  .hero .icon svg { width:18px; height:18px; }
  .hero .v { font-family:var(--mono); font-size:36px; font-weight:700; letter-spacing:-0.03em; line-height:1; margin-bottom:6px; color:var(--text-primary); }
  .hero .sub { font-family:var(--font); font-size:12px; color:var(--text-muted); }
  .compo {
    display:flex; align-items:center; gap:14px; margin-top:10px;
    padding-top:10px; border-top:1px solid var(--border);
  }
  .compo-item { display:flex; flex-direction:column; gap:2px; }
  .compo-item .il { font-family:var(--mono); font-size:9.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; }
  .compo-item .iv { font-family:var(--mono); font-size:14px; font-weight:600; color:var(--text-primary); }
  .compo-sep { font-family:var(--mono); font-size:18px; color:var(--border); }

  /* Normal kpi-card row */
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
  .k {
    background:#fff; border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; border-left:3px solid transparent;
  }
  .k.green  { border-left-color:var(--aprovado); }
  .k.blue   { border-left-color:var(--novo); }
  .k.orange { border-left-color:var(--avaliacao); }
  .k .l { font-family:var(--font); font-size:11.5px; color:var(--text-muted); margin-bottom:4px; }
  .k .v { font-family:var(--mono); font-size:24px; font-weight:600; letter-spacing:-0.02em; line-height:1; margin-bottom:5px; }
  .k.green  .v { color:var(--aprovado); }
  .k.blue   .v { color:var(--novo); }
  .k.orange .v { color:var(--avaliacao); }
  .k .delta {
    display:inline-flex; align-items:center; gap:3px;
    font-family:var(--mono); font-size:10.5px; font-weight:500;
    padding:2px 7px; border-radius:100px;
    background:var(--aprovado-bg); color:var(--aprovado);
  }
  .k.blue .delta   { background:var(--novo-bg); color:var(--novo); }
  .k.orange .delta { background:var(--avaliacao-bg); color:var(--avaliacao); }
</style></head>
<body>
<div class="frame">
  <div class="head">KPI hero (destaque) + kpi-cards (row)</div>

  <div class="hero">
    <div class="top">
      <div>
        <div class="lbl">Valor total realizado · acumulado 2026</div>
      </div>
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
      </div>
    </div>
    <div class="v">R$ 3.74M</div>
    <span class="sub">Acima da meta projetada (R$ 3.2M)</span>
    <div class="compo">
      <div class="compo-item"><span class="il">FTE realocado</span><span class="iv">R$ 2.1M</span></div>
      <span class="compo-sep">+</span>
      <div class="compo-item"><span class="il">Ganhos diretos</span><span class="iv">R$ 1.64M</span></div>
      <span class="compo-sep">=</span>
      <div class="compo-item"><span class="il">Total</span><span class="iv">R$ 3.74M</span></div>
    </div>
  </div>

  <div class="row">
    <div class="k green"><div class="l">Entregues YTD</div><div class="v">11</div><span class="delta">+3 vs Q1</span></div>
    <div class="k blue"><div class="l">Em execução</div><div class="v">14</div><span class="delta">+2 esta semana</span></div>
    <div class="k orange"><div class="l">SLA médio</div><div class="v">6d</div><span class="delta">meta: 4d</span></div>
  </div>
</div>
</body></html>
