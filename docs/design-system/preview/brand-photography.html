<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Editorial photography" subtitle="Quatro arquétipos — capa, produto, lifestyle, abstrato" viewport="700x280" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Brand photography</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame { width:700px; padding:22px 28px; background:var(--surface); }
  .head { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin-bottom:10px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .tile { display:flex; flex-direction:column; gap:6px; }
  .img { aspect-ratio: 3/4; background-size:cover; background-position:center; border-radius:8px; border:1px solid var(--border); }
  .name { font-family:var(--font); font-size:11px; font-weight:500; color:var(--text-primary); }
  .role { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
</style></head>
<body>
<div class="frame">
  <div class="head">Fotografia editorial · paleta cinematográfica</div>
  <div class="grid">
    <div class="tile"><div class="img" style="background-image:url('../assets/brand-photography/editorial-desert-duo.jpeg')"></div><div class="name">Capa solene</div><div class="role">Crepúsculo · sépia</div></div>
    <div class="tile"><div class="img" style="background-image:url('../assets/brand-photography/floral-gowns-duo.png')"></div><div class="name">Coleção / produto</div><div class="role">Studio · suave</div></div>
    <div class="tile"><div class="img" style="background-image:url('../assets/brand-photography/skater-sky.jpeg')"></div><div class="name">Lifestyle</div><div class="role">Movimento · céu</div></div>
    <div class="tile"><div class="img" style="background-image:url('../assets/brand-photography/movement-bw-diptych.jpeg')"></div><div class="name">Editorial abstrato</div><div class="role">B&W · contraste</div></div>
  </div>
</div>
</body></html>
