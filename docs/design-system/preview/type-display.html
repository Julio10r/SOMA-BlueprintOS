<!doctype html>
<!-- @dsCard group="Brand" name="Type · Display" subtitle="Inter Tight 700 · capas, heroes, slides de abertura" viewport="700x200" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame { width:700px; padding:24px 32px; background:var(--surface); }
  .hero { font-family:var(--font-display); font-weight:700; font-size:88px; line-height:0.95; letter-spacing:-0.03em; color:var(--text-primary); }
  .hero em { font-style:italic; font-weight:500; color:var(--text-secondary); }
  .meta { display:flex; gap:24px; margin-top:14px; align-items:baseline; }
  .meta .k { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
  .meta .v { font-family:var(--font); font-size:13px; color:var(--text-primary); font-weight:500; }
  .row { display:flex; gap:6px; }
</style></head>
<body>
<div class="frame">
  <div class="hero">Rumo a 2154.</div>
  <div class="meta">
    <div class="row"><span class="k">Família</span><span class="v">Inter Tight</span></div>
    <div class="row"><span class="k">Peso</span><span class="v">700 Bold</span></div>
    <div class="row"><span class="k">Tracking</span><span class="v">-0.03em</span></div>
    <div class="row"><span class="k">Uso</span><span class="v">Capas, heroes, slides de abertura</span></div>
  </div>
</div>
</body></html>
