<!doctype html>
<!-- @dsCard group="Brand" name="Spacing · Radii" subtitle="xs 4 · sm 8 · md 12 · lg 16 · pill 100" viewport="700x180" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame { width:700px; padding:22px 28px; background:var(--surface); display:flex; gap:18px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; gap:8px; align-items:center; flex:1; }
  .box { background:var(--bg); border:1px solid var(--border); width:88px; height:64px; }
  .name { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
  .val  { font-family:var(--mono); font-size:11px; color:var(--text-primary); font-weight:500; }
  .use  { font-size:10px; color:var(--text-muted); text-align:center; line-height:1.3; min-height:24px; }
</style></head>
<body>
<div class="frame">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="val">4px</div><div class="use">Tags, nivel-badges, skel lines</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="val">8px</div><div class="use">Botões, inputs, badges grandes</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">md</div><div class="val">12px</div><div class="use">Cards, modais, containers</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">lg</div><div class="val">16px</div><div class="use">Hero modals, containers grandes</div></div>
  <div class="item"><div class="box" style="border-radius:100px;width:120px;height:36px"></div><div class="name">pill</div><div class="val">100px</div><div class="use">Filtros, status badges, search</div></div>
</div>
</body></html>
