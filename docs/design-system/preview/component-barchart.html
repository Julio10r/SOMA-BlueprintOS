<!doctype html>
<!-- @dsCard group="Brand" name="Components · Bar chart" subtitle="Distribuição horizontal — fill em status colors" viewport="700x220" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Bar chart</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background:var(--bg); }
  .frame { width:700px; padding:22px 28px; background:var(--bg); }
  .wrap { background:#fff; border:1px solid #E2E0DB; border-radius:12px; padding:18px 22px; }
  .title { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:#9B9890; margin-bottom:12px; }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .row:last-child { margin-bottom:0; }
  .lbl { font-family:var(--font); font-size:12px; color:#6B6860; width:140px; flex-shrink:0; }
  .track { flex:1; height:8px; background:#F7F6F3; border-radius:100px; overflow:hidden; }
  .fill { height:100%; border-radius:100px; }
  .val { font-family:var(--mono); font-size:12px; font-weight:500; min-width:36px; text-align:right; color:#1A1916; }
</style></head>
<body>
<div class="frame">
  <div class="wrap">
    <div class="title">Demandas por área</div>
    <div class="row"><span class="lbl">Financeiro</span><div class="track"><div class="fill" style="width:85%;background:#1A1916"></div></div><span class="val">17</span></div>
    <div class="row"><span class="lbl">Tecnologia</span><div class="track"><div class="fill" style="width:65%;background:#4A90D9"></div></div><span class="val">13</span></div>
    <div class="row"><span class="lbl">Operações</span><div class="track"><div class="fill" style="width:40%;background:#2D6A4F"></div></div><span class="val">8</span></div>
    <div class="row"><span class="lbl">Comercial</span><div class="track"><div class="fill" style="width:20%;background:#E09B3D"></div></div><span class="val">4</span></div>
    <div class="row"><span class="lbl">Supply chain</span><div class="track"><div class="fill" style="width:12%;background:#9B6CC8"></div></div><span class="val">2</span></div>
  </div>
</div>
</body></html>
