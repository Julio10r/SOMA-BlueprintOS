<!doctype html>
<!-- @dsCard group="Brand" name="Components · Page tabs (underline)" subtitle="Sub-navegação de módulo (≠ filter pill)" viewport="700x180" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Page tabs (underline)</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background:var(--bg); }
  .frame { width:700px; padding:22px 28px; background:var(--bg); display:flex; flex-direction:column; gap:14px; }
  .head { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
  .tabs { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:0 16px; display:flex; gap:0; overflow:hidden; }
  .tab {
    display:inline-flex; align-items:center; gap:7px;
    padding:13px 14px 11px;
    font-family:var(--font); font-size:13px; font-weight:500;
    color:var(--text-muted); background:transparent; border:none; cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-1px;
    transition:color 150ms, border-color 150ms;
  }
  .tab:hover { color:var(--text-primary); }
  .tab.active { color:var(--text-primary); border-bottom-color:var(--accent); }
  .tab .c { font-family:var(--mono); font-size:10.5px; padding:1px 7px; border-radius:100px; background:var(--bg); color:var(--text-muted); }
  .tab.active .c { background:var(--text-primary); color:#fff; }
  .note { font-family:var(--font); font-size:11.5px; color:var(--text-secondary); line-height:1.55; }
</style></head>
<body>
<div class="frame">
  <div class="head">Page tabs · sub-navegação interna do módulo (underline + count)</div>
  <div class="tabs">
    <button class="tab active">Painel de Controle</button>
    <button class="tab">Lista de Chamados <span class="c">847</span></button>
    <button class="tab">Análise Detalhada</button>
    <button class="tab">Ranking</button>
    <button class="tab">Base de Conhecimento</button>
    <button class="tab">Monitor SLA</button>
  </div>
  <p class="note">
    Diferente do <b>filter-pill</b> (que filtra dados): usa-se para trocar entre páginas/seções dentro de um módulo. Active = underline preto 2px + texto primary. Badge de count vira pill preta quando active.
  </p>
</div>
</body></html>
