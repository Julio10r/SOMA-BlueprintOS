<!doctype html>
<!-- @dsCard group="Brand" name="Colors · Portal foundation" subtitle="Superfícies, bordas, hierarquia de texto" viewport="700x280" -->
<html lang="pt-BR"><head><meta charset="utf-8"><title>Portal foundation colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  .frame { width:700px; padding:22px 28px; background:var(--surface); }
  .head { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin-bottom:12px; }
  .row { display:flex; gap:10px; margin-bottom:10px; }
  .row:last-child { margin-bottom:0; }
  .tile { flex:1; display:flex; flex-direction:column; gap:4px; }
  .chip { height:48px; border-radius:var(--radius-sm); border:1px solid var(--border); }
  .name { font-size:11px; font-weight:500; color:var(--text-primary); }
  .hex  { font-family:var(--mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
<div class="frame">
  <div class="head">Superfícies & bordas</div>
  <div class="row">
    <div class="tile"><div class="chip" style="background:#F7F6F3"></div><div class="name">--bg</div><div class="hex">#F7F6F3</div></div>
    <div class="tile"><div class="chip" style="background:#FAF9F6"></div><div class="name">--surface-2</div><div class="hex">#FAF9F6</div></div>
    <div class="tile"><div class="chip" style="background:#FFFFFF"></div><div class="name">--surface</div><div class="hex">#FFFFFF</div></div>
    <div class="tile"><div class="chip" style="background:#E2E0DB"></div><div class="name">--border</div><div class="hex">#E2E0DB</div></div>
    <div class="tile"><div class="chip" style="background:#C8C5BE"></div><div class="name">--border-hover</div><div class="hex">#C8C5BE</div></div>
  </div>
  <div class="head" style="margin-top:14px">Hierarquia de texto</div>
  <div class="row">
    <div class="tile"><div class="chip" style="background:#1A1916"></div><div class="name">--text-primary</div><div class="hex">#1A1916</div></div>
    <div class="tile"><div class="chip" style="background:#6B6860"></div><div class="name">--text-secondary</div><div class="hex">#6B6860</div></div>
    <div class="tile"><div class="chip" style="background:#9B9890"></div><div class="name">--text-muted</div><div class="hex">#9B9890</div></div>
    <div class="tile" style="flex:2"><div class="chip" style="background:#F7F6F3;display:flex;align-items:center;padding:0 14px;color:#1A1916;font-family:var(--font);font-size:13px">Quase-preto sobre bege quente — base de TODAS as sombras.</div><div class="name">Combinação base</div><div class="hex">rgba(26,25,22,x)</div></div>
  </div>
</div>
</body></html>
